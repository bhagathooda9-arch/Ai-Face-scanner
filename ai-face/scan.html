<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Smart Scan Attendance Ultra Fixed</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial, sans-serif;
background:#0f172a;
color:#fff;
padding:20px;
}

.container{
max-width:1200px;
margin:auto;
}

h1,h2{
text-align:center;
margin-bottom:15px;
}

video{
width:100%;
max-width:520px;
display:block;
margin:auto;
border-radius:14px;
border:4px solid #22c55e;
background:#000;
}

.status{
margin:15px 0;
padding:14px;
background:#1e293b;
border-radius:12px;
text-align:center;
font-size:18px;
font-weight:bold;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:15px;
margin-top:20px;
}

.card{
background:#1e293b;
padding:15px;
border-radius:12px;
text-align:center;
}

.card img{
width:120px;
height:120px;
object-fit:cover;
border-radius:10px;
border:3px solid #22c55e;
margin-bottom:10px;
}

.ok{color:#22c55e;}
.err{color:#ef4444;}

button{
width:100%;
padding:10px;
margin-top:8px;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}

.editBtn{background:#f59e0b;color:#fff;}
.delBtn{background:#ef4444;color:#fff;}
</style>
</head>
<body>

<div class="container">

<h1>Smart Scan Attendance</h1>

<video id="video" autoplay muted playsinline></video>

<div class="status" id="status">Loading...</div>

<h2>Today's Attendance</h2>

<div class="grid" id="todayBox"></div>

</div>

<script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
firebase.initializeApp({
apiKey:"AIzaSyDPDKUCZ_QJ_Lx_Q_S-stDwk9eaIFGJhko",
authDomain:"face-recognization-de9e6.firebaseapp.com",
projectId:"face-recognization-de9e6"
});

const db = firebase.firestore();

const video = document.getElementById("video");
const statusBox = document.getElementById("status");
const todayBox = document.getElementById("todayBox");

let matcher = null;
let scanBusy = false;
let lastDetected = "";
let cooldown = false;

/* AUTO UPDATE PERSON DATA */
db.collection("persons").onSnapshot(async ()=>{
statusBox.innerHTML = "Updating Face Data...";
await buildMatcher();
statusBox.innerHTML = "System Ready ✅";
});

/* START */
window.onload = ()=>{
setTimeout(startSystem,1000);
};

async function startSystem(){

try{

statusBox.innerHTML = "Loading AI Models...";

await faceapi.nets.tinyFaceDetector.loadFromUri("https://justadudewhohacks.github.io/face-api.js/models");
await faceapi.nets.faceLandmark68Net.loadFromUri("https://justadudewhohacks.github.io/face-api.js/models");
await faceapi.nets.faceRecognitionNet.loadFromUri("https://justadudewhohacks.github.io/face-api.js/models");

await buildMatcher();

const stream = await navigator.mediaDevices.getUserMedia({video:true});
video.srcObject = stream;

statusBox.innerHTML = "Camera Ready 📷";

setInterval(scanFace,2500);

loadToday();

}catch(err){
statusBox.innerHTML = err.message;
}

}

/* BUILD MATCHER */
async function buildMatcher(){

const snap = await db.collection("persons").get();

let labels = [];

for(const doc of snap.docs){

let p = doc.data();

try{

if(!p.image) continue;

const img = await faceapi.fetchImage(p.image);

const det = await faceapi.detectSingleFace(
img,
new faceapi.TinyFaceDetectorOptions()
).withFaceLandmarks().withFaceDescriptor();

if(det){

labels.push(
new faceapi.LabeledFaceDescriptors(
p.id,
[det.descriptor]
)
);

}

}catch(e){}

}

matcher = new faceapi.FaceMatcher(labels,0.48);

}

/* SCAN FACE */
async function scanFace(){

if(scanBusy || cooldown || !matcher) return;

scanBusy = true;

try{

const det = await faceapi.detectSingleFace(
video,
new faceapi.TinyFaceDetectorOptions()
).withFaceLandmarks().withFaceDescriptor();

if(!det){
statusBox.innerHTML = "No Face Found";
scanBusy = false;
return;
}

const result = matcher.findBestMatch(det.descriptor);

if(result.label === "unknown"){
statusBox.innerHTML = "Person Not Recognised ❌";
scanBusy = false;
return;
}

/* fetch fresh data from firestore */
let pid = result.label;

const personDoc = await db.collection("persons").doc(pid).get();

if(!personDoc.exists){
statusBox.innerHTML = "Person Data Missing";
scanBusy = false;
return;
}

let person = personDoc.data();

/* old image recall fix */
if(lastDetected === pid){
scanBusy = false;
return;
}

lastDetected = pid;

await markAttendance(
person.id,
person.name,
person.image
);

cooldown = true;
setTimeout(()=>{
cooldown = false;
lastDetected = "";
},5000);

}catch(err){
statusBox.innerHTML = "Scan Error";
}

scanBusy = false;

}

/* MARK ATTENDANCE */
async function markAttendance(id,name,image){

let now = new Date();

let date = now.toLocaleDateString();
let time = now.toLocaleTimeString();

let docId = id + "_" + date.replace(/\//g,"-");

const ref = db.collection("attendance").doc(docId);
const check = await ref.get();

if(check.exists){
statusBox.innerHTML = name + " Already Present";
return;
}

await ref.set({
id:id,
name:name,
image:image,
date:date,
time:time,
status:"Present",
created:Date.now()
});

statusBox.innerHTML = "Attendance Marked : " + name + " ✅";

}

/* LOAD TODAY */
function loadToday(){

db.collection("attendance")
.orderBy("created","desc")
.onSnapshot(snapshot=>{

todayBox.innerHTML = "";

if(snapshot.empty){
todayBox.innerHTML = "No Attendance";
return;
}

snapshot.forEach(doc=>{

let d = doc.data();

todayBox.innerHTML += `
<div class="card">

<img src="${d.image}">

<h3>${d.name}</h3>

<p>ID : ${d.id}</p>

<p>${d.date}</p>

<p>${d.time}</p>

<p class="ok">${d.status}</p>

<button class="editBtn"
onclick="editAttendance('${doc.id}','${d.status}')">
Edit
</button>

<button class="delBtn"
onclick="deleteAttendance('${doc.id}')">
Delete
</button>

</div>
`;

});

});

}

/* EDIT */
function editAttendance(docId,current){

let val = prompt(
"Enter Status:\nPresent / Absent / Leave",
current
);

if(!val) return;

db.collection("attendance").doc(docId).update({
status:val
});

}

/* DELETE */
function deleteAttendance(docId){

if(confirm("Delete Attendance?")){

db.collection("attendance").doc(docId).delete();

}

}
</script>

</body>
</html>
